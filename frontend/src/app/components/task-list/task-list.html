<h2>Tasks</h2>

<div class="counter">
  <p><strong>{{ pendingCount }} pending, {{ doneCount }} done</strong></p>
</div>

<div class="filters" *ngIf="showDropdowns">
  <div class="filter-group">
    <label>Status:</label>
    <select [(ngModel)]="filterStatus" (change)="applyFilters()" name="status">
      <option value="all">All</option>
      <option value="pending">Pending</option>
      <option value="done">Done</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Priority:</label>
    <select [(ngModel)]="filterPriority" (change)="applyFilters()" name="priority">
      <option value="">All</option>
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
  </div>
</div>

<div class="task-list">
  <div *ngFor="let task of tasks" class="task-item">
    <div class="task-item-header">
      <h3>{{ task.title }}</h3>
      <span class="task-priority">{{ task.priority }}</span>
    </div>

    <p class="task-desc" *ngIf="task.description">{{ task.description }}</p>

    <div class="task-meta">
      <span>Due: {{ task.due_date || 'No due date' }}</span>
      <span>Status: <strong>{{ task.is_done ? 'Done' : 'Pending' }}</strong></span>
    </div>

    <div class="task-actions">
      <button class="toggle" (click)="toggleDone(task)">
        {{ task.is_done ? 'Mark Pending' : 'Mark Done' }}
      </button>
      <button class="delete" (click)="openDeleteDialog(task.id!, task.title)">
        Delete
      </button>
    </div>
  </div>
</div>

<div class="modal-backdrop" *ngIf="deleteDialogVisible">
  <div class="modal">
    <h3>Confirm Delete</h3>
    <p>Are you sure you want to delete "{{ deleteTargetTitle }}"?</p>
    <div class="modal-actions">
      <button class="confirm" (click)="confirmDeleteTask()">Yes, delete</button>
      <button class="cancel" (click)="cancelDelete()">Cancel</button>
    </div>
  </div>
</div>
